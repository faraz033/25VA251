<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in JS</title>
</head>
<body>
    <script>
     // Loops in JavaScript are control structures that repeat a block of code while a specified condition is true.
     let studentList = ["faraz","aman","vikas","nilesh","john"]
     for(let i = 0; i<studentList.length; i++){
        console.log(studentList[i]);
     }
    // using for..in loop = Iterates over  
    </script>
</body>
</html>
