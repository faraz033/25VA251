<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in JS</title>
</head>
<body>
    <script>
        //Functions:- In JavaScript, a function is a reusable blocks of code designed to perform specific tasks. 

        //normal function
        //without parameters
        function demo(){
            console.log("Hello JS");
        }
        demo();//function calling

        //with parameters
        function demo1(text){
            console.log("Hello " + text)
        }
        demo1("react");

        function cal(a,b=9){
            console.log("addition of two number is " + (a+b));
        }
        cal(12);

        //Anonymous functions in JavaScript are functions without a name, 
        //defined using the function keyword without an identifier or using arrow syntax (=>)

        let msg = function(){
            console.log("Hello Advanced JS");
        };
        msg();

        //shore code for above function i.e arrow function
        let msg1=()=>console.log("Hello function as an arrow");
        msg1();

        // arrow function using multilines

        let add=(a,b)=>{
            console.log("First nummber is " + a);
            console.log("Second number is " + b);
            console.log("addition of two number is " + (a+b));
        }
        add(4,5);

        //IIFE: An Immediately Invoked Function Expression (IIFE) in JavaScript is a function 
        // that executes as soon as it is defined.
        (function(){
            console.log("IIFE in JS");
        })();
        //IIFE using arrow
        (()=>console.log("IIFE using arrow"))();

        //Callback function:- A callback function in JavaScript is a function passed as an argument to another function, 
        // which is then invoked inside the outer function to complete a specific task.
        
        function mul(callback){
            var num1 = 10;
            console.log("First value is " + num1);
            var num2 = 20;
            console.log("Second value is " + num2);
            var res = num1*num2;
            callback(res);
        }

        function result(res){
            console.log("Multiplication is " + res);
        }
        mul(result);

        //callback function using settimeout API

        function msg2(){
            console.log("Hello Call Back");
            document.writeln("Hello");
        }
        function loading(){
            document.writeln("loading..........")
        };
        setTimeout(msg2,2000);
        loading();

        // map filter and reduce 
        let num = [3,4,5,7];
        let finalresult = num.map((n=>n*2));
        console.log(finalresult);

        //filter method:- filter() method is a built-in array method that creates a new array containing only the elements 
        // that pass a specified condition.
        // It does not modify the original array.

        let finalresult1=num.filter(n=>(n>3));
        console.log(finalresult1);

        //reduce method:- The reduce() method in JavaScript is a higher-order function that processes 
        // each element of an array through a callback function, accumulating the results into a single value. 

        let finalresult2=num.reduce((total,n)=>total+n);
        console.log(finalresult2);

        //promises:- JavaScript Promises are objects that represent the eventual completion (or failure) of an 
        // asynchronous operation and its resulting value. 

        let promise = new Promise(function(resolve, reject){
            let age = 5;
            if(age>=18){
                resolve("Valid age ");
            }
            else{
                reject("Wait for next year");
            }
        });
        promise.then(result=>console.log(result)).catch(error=>console.log(error)).
        finally(msg=>console.log("done"));
        
    </script>
</body>
</html>
